<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>Trada | Smart Pool</title>
    
    <!-- الأيقونة البرمجية تظهر في الخارج تلقائياً -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23eab308'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='black' font-family='Arial' font-weight='bold' font-size='50'>T</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

    <div class="card p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border-yellow-500/20">

        <div class="mt-8 grid grid-cols-2 gap-4">
