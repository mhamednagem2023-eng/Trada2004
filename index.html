<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trada | Trading Hub</title>
    
    <!-- الأيقونات لضمان ظهور الشعار في المتصفحات اللامركزية -->
    <link rel="icon" href="https://i.ibb.co/Lg9xG7G/trada-logo.png" type="image/png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Lg9xG7G/trada-logo.png">
    <meta property="og:image" content="https://i.ibb.co/Lg9xG7G/trada-logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white min-h-screen">

    <!-- Navbar -->
    <nav class="p-6 flex justify-between items-center border-b border-gray-800">
        <img src="https://i.ibb.co/Lg9xG7G/trada-logo.png" class="w-12 h-12 rounded-lg" alt="Trada Logo">
        <button id="connectBtn" class="bg-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">
            Connect Wallet
        </button>
    </nav>

    <!-- Trading Interface -->
    <main class="max-w-md mx-auto mt-10 p-6 bg-gray-900 rounded-3xl border border-gray-800 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center">Trade USDC</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-sm text-gray-400 mb-2 block">Amount</label>
                <input type="number" id="amount" placeholder="0.0" class="w-full bg-black p-4 rounded-xl border border-gray-700 outline-none focus:border-blue-500">
            </div>
            
            <button onclick="executeTrade()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition">
                Confirm Trade
            </button>
        </div>
    </main>

    <script>
        // دالة تنفيذ التداول (Manual Model)
        async function executeTrade() {
            const amount = document.getElementById('amount').value;
            if(!amount) return alert("Please enter amount");
            
            alert("Executing manual transaction for: " + amount + " USDC");
            // هنا سيتم ربط الـ ABI الخاص بعقدك الذكي لاحقاً
        }
    </script>
</body>
</html>
